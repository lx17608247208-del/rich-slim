.section-card { background: var(--card-bg); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }

.stage-info { display: flex; align-items: center; gap: 16px; }

.stage-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-light); margin-bottom: 8px; }

.stage-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--gold)); border-radius: 3px; transition: width 0.5s ease; }
.stage-progress-text { font-size: 11px; color: var(--text-light); text-align: right; margin-top: 4px; }

.adjustment-title { font-weight: 600; font-size: 14px; }

.adjustment-actions li { font-size: 13px; padding: 3px 0; padding-left: 16px; position: relative; }
.adjustment-actions li::before { content: '•'; position: absolute; left: 4px; color: var(--gold); }
.empty-text { text-align: center; color: var(--text-light); font-size: 13px; padding: 20px 0; }

.diet-checkin, .exercise-checkin { display: flex; align-items: center; gap: 12px; background: var(--card-bg); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }

.meals-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

function getUserData(userId){const presetUser=USERS.find(u=>u.id===userId);if(!presetUser)return null;const savedData=localStorage.getItem(`rich_slim_${userId}`);if(savedData){return{...presetUser,...JSON.parse(savedData)}}return presetUser}function saveUserData(userId,data){localStorage.setItem(`rich_slim_${userId}`,JSON.stringify(data))}function getTodayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function getDayOfWeek(){const days=['周日','周一','周二','周三','周四','周五','周六'];return days[new Date().getDay()]}function calcBMI(weight,height){const h=height/100;return(weight/(h*h)).toFixed(1)}function calcProgress(current,start,target){const total=start-target;const done=start-current;return Math.min(100,Math.max(0,(done/total)*100)).toFixed(1)}

// utils.js
function getCurrentUser(){const userId=localStorage.getItem('rich_slim_current_user');if(!userId)return null;return getUserData(userId)}function setCurrentUser(userId){localStorage.setItem('rich_slim_current_user',userId)}function logout(){localStorage.removeItem('rich_slim_current_user');window.location.reload()}function getCheckins(userId,type){const key=`rich_slim_checkin_${userId}_${type}`;const data=localStorage.getItem(key);return data?JSON.parse(data):{}}function setCheckin(userId,type,date,value){const key=`rich_slim_checkin_${userId}_${type}`;const data=getCheckins(userId,type);data[date]=value;localStorage.setItem(key,JSON.stringify(data))}function isTodayChecked(userId,type){const data=getCheckins(userId,type);return!!data[getTodayStr()]}function calcCheckinRate(userId,type,startDate,endDate){const data=getCheckins(userId,type);let totalDays=0;let checkedDays=0;const start=new Date(startDate);const end=new Date(endDate);const today=new Date(getTodayStr());const actualEnd=end>today?today:end;for(let d=new Date(start);d<=actualEnd;d.setDate(d.getDate()+1)){totalDays++;const dateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(data[dateStr])checkedDays++}return totalDays>0?((checkedDays/totalDays)*100).toFixed(1):'0.0'}function generateAdjustment(userId){const user=getUserData(userId);const activeStage=user.stages.find(s=>s.status==='active');if(!activeStage)return null;const dietRate=parseFloat(calcCheckinRate(userId,'diet',activeStage.startDate,activeStage.endDate));const exerciseRate=parseFloat(calcCheckinRate(userId,'exercise',activeStage.startDate,activeStage.endDate));const suggestions=[];if(dietRate<60){suggestions.push({type:'diet',icon:'��',title:'饮食计划调整',reason:`饮食打卡完成率仅${dietRate}%，执行力度不足`,actions:['增加蛋白质摄入比例（鸡胸肉、鱼肉、蛋白）','减少精制碳水，替换为粗粮（糙米、燕麦、红薯）','设定手机定时提醒，确保三餐按时记录']})}if(exerciseRate<60){suggestions.push({type:'exercise',icon:'��',title:'运动计划调整',reason:`运动打卡完成率仅${exerciseRate}%，运动量不足`,actions:['降低单次运动强度，增加运动频次','选择更易坚持的运动方式（散步、游泳）','安排固定运动时间，培养运动习惯']})}if(dietRate>=60&&exerciseRate>=60){suggestions.push({type:'both',icon:'��',title:'饮食+运动综合调整',reason:'饮食和运动执行良好但体重未达标，需要优化方案',actions:['饮食：进一步减少每日热量摄入200-300大卡','运动：增加有氧运动时长10-15分钟','注意：保证充足睡眠（7-8小时），减少压力']})}return suggestions}function formatDate(dateStr){const d=new Date(dateStr);return`${d.getMonth()+1}月${d.getDate()}日`}function generateWeightTrend(user){return user.weightHistory.map(h=>({date:formatDate(h.date),weight:h.weight}))}

// chart.js
const Chart={drawWeightTrend(canvasId,data,targetWeight){const canvas=document.getElementById(canvasId);if(!canvas)return;const ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1;const rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;ctx.scale(dpr,dpr);const w=rect.width;const h=rect.height;const padding={top:20,right:20,bottom:30,left:40};const chartW=w-padding.left-padding.right;const chartH=h-padding.top-padding.bottom;const weights=data.map(d=>d.weight);const allValues=targetWeight?[...weights,targetWeight]:weights;const minW=Math.min(...allValues)-2;const maxW=Math.max(...allValues)+2;ctx.clearRect(0,0,w,h);ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.5;for(let i=0;i<=4;i++){const y=padding.top+(chartH/4)*i;ctx.beginPath();ctx.moveTo(padding.left,y);ctx.lineTo(w-padding.right,y);ctx.stroke();const val=maxW-((maxW-minW)/4)*i;ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(val.toFixed(1),padding.left-5,y+4)}if(targetWeight){const targetY=padding.top+chartH*(1-(targetWeight-minW)/(maxW-minW));ctx.strokeStyle='#d4af37';ctx.lineWidth=1;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(padding.left,targetY);ctx.lineTo(w-padding.right,targetY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#d4af37';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText(`目标 ${targetWeight}kg`,padding.left+5,targetY-5)}if(data.length<2)return;const points=data.map((d,i)=>({x:padding.left+(chartW/(data.length-1))*i,y:padding.top+chartH*(1-(d.weight-minW)/(maxW-minW))}));const gradient=ctx.createLinearGradient(0,padding.top,0,padding.top+chartH);gradient.addColorStop(0,'rgba(26,26,46,0.3)');gradient.addColorStop(1,'rgba(26,26,46,0)');ctx.beginPath();ctx.moveTo(points[0].x,padding.top+chartH);points.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(points[points.length-1].x,padding.top+chartH);ctx.closePath();ctx.fillStyle=gradient;ctx.fill();ctx.beginPath();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2;points.forEach((p,i)=>{if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y)});ctx.stroke();points.forEach((p,i)=>{ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke()});ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='center';data.forEach((d,i)=>{if(i%Math.ceil(data.length/5)===0||i===data.length-1){const x=padding.left+(chartW/(data.length-1))*i;ctx.fillText(d.date,x,h-5)}})},drawProgressRing(canvasId,percent,color='#1a1a2e'){const canvas=document.getElementById(canvasId);if(!canvas)return;const ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1;const size=Math.min(canvas.getBoundingClientRect().width,canvas.getBoundingClientRect().height);canvas.width=size*dpr;canvas.height=size*dpr;ctx.scale(dpr,dpr);const center=size/2;const radius=size/2-8;const lineWidth=6;ctx.beginPath();ctx.arc(center,center,radius,0,Math.PI*2);ctx.strokeStyle='#eee';ctx.lineWidth=lineWidth;ctx.stroke();const startAngle=-Math.PI/2;const endAngle=startAngle+(Math.PI*2*percent)/100;ctx.beginPath();ctx.arc(center,center,radius,startAngle,endAngle);ctx.strokeStyle=color;ctx.lineWidth=lineWidth;ctx.lineCap='round';ctx.stroke();ctx.fillStyle='#333';ctx.font=`bold ${size*0.25}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`${percent.toFixed(1)}%`,center,center)},drawMiniBar(canvasId,values,labels){const canvas=document.getElementById(canvasId);if(!canvas)return;const ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1;const rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;ctx.scale(dpr,dpr);const w=rect.width;const h=rect.height;const padding={top:5,right:5,bottom:20,left:5};const chartW=w-padding.left-padding.right;const chartH=h-padding.top-padding.bottom;const barWidth=chartW/values.length*0.6;const gap=chartW/values.length*0.4;const maxVal=Math.max(...values,1);ctx.clearRect(0,0,w,h);values.forEach((val,i)=>{const x=padding.left+(chartW/values.length)*i+gap/2;const barH=(val/maxVal)*chartH;const y=padding.top+chartH-barH;const gradient=ctx.createLinearGradient(x,y,x,y+barH);gradient.addColorStop(0,'#1a1a2e');gradient.addColorStop(1,'#d4af37');ctx.fillStyle=gradient;ctx.fillRect(x,y,barWidth,barH);if(labels){ctx.fillStyle='#999';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(labels[i],x+barWidth/2,h-3)}})}};

const Router={routes:{},currentRoute:null,register(path,handler){this.routes[path]=handler},navigate(path){if(this.currentRoute===path)return;this.currentRoute=path;const handler=this.routes[path];if(handler){const app=document.getElementById('app');app.innerHTML='';app.className='';handler(app);document.querySelectorAll('.tab-item').forEach(tab=>{tab.classList.toggle('active',tab.dataset.route===path)});window.scrollTo(0,0)}},init(){document.querySelectorAll('.tab-item').forEach(tab=>{tab.addEventListener('click',()=>{const route=tab.dataset.route;if(route)this.navigate(route)})});const userId=localStorage.getItem('rich_slim_current_user');if(!userId){this.navigate('login')}else{this.navigate('home')}}}

function renderLoginPage(container){const nav=document.getElementById('bottom-nav');nav.style.display='none';container.innerHTML=`<div class="login-page"><div class="login-header"><div class="login-logo">&#x1F451;</div><h1 class="login-title">富豪减肥</h1><p class="login-subtitle">定制你的蜕变之旅</p></div><div class="login-users">${USERS.map(user=>`<div class="user-card" data-userid="${user.id}"><div class="user-avatar">${user.avatar}</div><div class="user-info"><div class="user-name">${user.name}</div><div class="user-meta">${user.gender==='male'?'男':'女'} · ${user.age}岁 · ${user.height}cm · ${user.currentWeight}kg</div><div class="user-goal">目标: ${user.targetWeight}kg (减${user.currentWeight-user.targetWeight}kg)</div></div><div class="user-arrow">&#x203A;</div></div>`).join('')}</div><div class="login-footer"><p>体验版 · 仅限3名用户</p></div></div>`;container.querySelectorAll('.user-card').forEach(card=>{card.addEventListener('click',()=>{const userId=card.dataset.userid;showPasswordModal(userId)})})}

function showPasswordModal(userId){const user=USERS.find(u=>u.id===userId);const modal=document.createElement('div');modal.className='modal-overlay';modal.innerHTML=`<div class="modal-content"><h3>验证身份</h3><p class="modal-user">${user.avatar} ${user.name}</p><input type="password" class="modal-input" placeholder="请输入密码" maxlength="6" /><p class="modal-hint">默认密码: 123456</p><div class="modal-actions"><button class="btn-cancel">取消</button><button class="btn-confirm">确认</button></div></div>`;document.body.appendChild(modal);const input=modal.querySelector('.modal-input');input.focus();modal.querySelector('.btn-cancel').addEventListener('click',()=>modal.remove());modal.querySelector('.btn-confirm').addEventListener('click',()=>{if(input.value===user.password){setCurrentUser(userId);modal.remove();Router.navigate('home')}else{input.style.borderColor='#e74c3c';input.value='';input.placeholder='密码错误，请重试'}});input.addEventListener('keydown',(e)=>{if(e.key==='Enter')modal.querySelector('.btn-confirm').click()})}

function renderHomePage(container){const nav=document.getElementById('bottom-nav');nav.style.display='flex';const user=getCurrentUser();if(!user){Router.navigate('login');return}const bmi=calcBMI(user.currentWeight,user.height);const activeStage=user.stages.find(s=>s.status==='active');const progress=activeStage?calcProgress(user.currentWeight,activeStage.startWeight,activeStage.targetWeight):0;const totalProgress=calcProgress(user.currentWeight,user.stages[0].startWeight,user.targetWeight);const dietChecked=isTodayChecked(user.id,'diet');const exerciseChecked=isTodayChecked(user.id,'exercise');container.innerHTML=`<div class="page home-page"><div class="page-header"><div class="header-left"><span class="header-avatar">${user.avatar}</span><div><div class="header-greeting">你好，${user.name}</div><div class="header-date">${getTodayStr()} ${getDayOfWeek()}</div></div></div><button class="btn-logout" onclick="logout()">退出</button></div><div class="dashboard"><div class="stat-card main-stat"><div class="stat-row"><div class="stat-item"><div class="stat-label">当前体重</div><div class="stat-value">${user.currentWeight}<span class="stat-unit">kg</span></div></div><div class="stat-item"><div class="stat-label">BMI</div><div class="stat-value ${bmi>28?'warning':bmi>24?'caution':'normal'}">${bmi}</div></div><div class="stat-item"><div class="stat-label">目标体重</div><div class="stat-value">${user.targetWeight}<span class="stat-unit">kg</span></div></div></div><div class="progress-bar"><div class="progress-fill" style="width: ${totalProgress}%"></div></div><div class="progress-text">总进度 ${totalProgress}%</div></div><div class="quick-actions"><div class="action-card ${dietChecked?'checked':''}" onclick="Router.navigate('diet')"><div class="action-icon">&#x1F957;</div><div class="action-label">饮食打卡</div><div class="action-status">${dietChecked?'✓ 已打卡':'待打卡'}</div></div><div class="action-card ${exerciseChecked?'checked':''}" onclick="Router.navigate('exercise')"><div class="action-icon">&#x1F3C3;</div><div class="action-label">运动打卡</div><div class="action-status">${exerciseChecked?'✓ 已打卡':'待打卡'}</div></div><div class="action-card" onclick="Router.navigate('style')"><div class="action-icon">&#x1F454;</div><div class="action-label">形象改造</div><div class="action-status">查看建议</div></div><div class="action-card" onclick="Router.navigate('report')"><div class="action-icon">&#x1F4CA;</div><div class="action-label">分析报告</div><div class="action-status">查看详情</div></div></div><div class="section-card"><div class="section-title">当前阶段</div>${activeStage?`<div class="stage-info"><div class="stage-name">${activeStage.name}</div><div class="stage-target">${activeStage.startWeight}kg → ${activeStage.targetWeight}kg</div><div class="stage-progress"><canvas id="home-ring" style="width:80px;height:80px;"></canvas><div class="stage-detail"><div>已减 ${activeStage.startWeight-user.currentWeight}kg</div><div>还需减 ${user.currentWeight-activeStage.targetWeight}kg</div></div></div></div>`:'<p>暂无进行中的阶段</p>'}</div><div class="section-card"><div class="section-title">体重趋势</div><canvas id="home-trend" style="width:100%;height:180px;"></canvas></div></div></div>`;setTimeout(()=>{if(activeStage){Chart.drawProgressRing('home-ring',parseFloat(progress),'#d4af37')}Chart.drawWeightTrend('home-trend',generateWeightTrend(user),user.targetWeight)},100)}

function renderPlanPage(container){const user=getCurrentUser();if(!user){Router.navigate('login');return}container.innerHTML=`<div class="page plan-page"><div class="page-header"><h2>减肥规划</h2></div><div class="plan-overview"><div class="overview-card"><div class="overview-label">总体目标</div><div class="overview-value">${user.currentWeight}kg → ${user.targetWeight}kg</div><div class="overview-sub">共需减重 ${user.currentWeight-user.targetWeight}kg</div></div><div class="overview-card"><div class="overview-label">体型分析</div><div class="overview-value">${user.bodyType}</div><div class="overview-sub">BMI ${calcBMI(user.currentWeight,user.height)}</div></div></div><div class="section-card"><div class="section-title">阶段目标</div><div class="stages-list">${user.stages.map((stage,idx)=>{const isActive=stage.status==='active';const isDone=stage.status==='completed';const isPending=stage.status==='pending';const stageProgress=isActive?calcProgress(user.currentWeight,stage.startWeight,stage.targetWeight):(isDone?100:0);return `<div class="stage-card ${isActive?'active':''} ${isDone?'done':''} ${isPending?'pending':''}"><div class="stage-header"><div class="stage-badge ${stage.status}">${isDone?'✓':isActive?'●':idx+1}</div><div class="stage-title">${stage.name}</div><div class="stage-status ${stage.status}">${isDone?'已完成':isActive?'进行中':'待开始'}</div></div><div class="stage-body"><div class="stage-meta"><span>${formatDate(stage.startDate)} - ${formatDate(stage.endDate)}</span><span>${stage.startWeight}kg → ${stage.targetWeight}kg</span></div>${isActive?`<div class="stage-progress-bar"><div class="stage-progress-fill" style="width: ${stageProgress}%"></div></div><div class="stage-progress-text">进度 ${stageProgress}%</div>`:''}</div></div>`}).join('')}</div></div><div class="section-card"><div class="section-title">智能调整建议</div><div id="adjustment-area">${renderAdjustments(user)}</div></div></div>`}

function renderAdjustments(user){const suggestions=generateAdjustment(user.id);if(!suggestions||suggestions.length===0){return '<p class="empty-text">暂无调整建议，继续保持当前计划</p>'}return suggestions.map(s=>`<div class="adjustment-card"><div class="adjustment-header"><span class="adjustment-icon">${s.icon}</span><span class="adjustment-title">${s.title}</span></div><div class="adjustment-reason">${s.reason}</div><ul class="adjustment-actions">${s.actions.map(a=>`<li>${a}</li>`).join('')}</ul></div>`).join('')}

function renderDietPage(container){const user=getCurrentUser();if(!user){Router.navigate('login');return}const dietChecked=isTodayChecked(user.id,'diet');const plan=user.dietPlan;container.innerHTML=`<div class="page diet-page"><div class="page-header"><h2>饮食计划</h2><div class="calorie-badge">每日 ${plan.dailyCalories} 大卡</div></div><div class="diet-checkin ${dietChecked?'checked':''}"><div class="checkin-icon">${dietChecked?'✅':'⬜'}</div><div class="checkin-text">${dietChecked?'今日已打卡':'今日未打卡'}</div><button class="btn-checkin" ${dietChecked?'disabled':''} id="diet-checkin-btn">${dietChecked?'已完成':'打卡'}</button></div><div class="meals-list"><div class="meal-card"><div class="meal-header"><span class="meal-icon">&#x1F305;</span><span class="meal-name">早餐</span><span class="meal-cal">${plan.meals.breakfast.calories} 大卡</span></div><ul class="meal-items">${plan.meals.breakfast.items.map(item=>`<li>${item}</li>`).join('')}</ul></div><div class="meal-card"><div class="meal-header"><span class="meal-icon">&#x2600;&#xFE0F;</span><span class="meal-name">午餐</span><span class="meal-cal">${plan.meals.lunch.calories} 大卡</span></div><ul class="meal-items">${plan.meals.lunch.items.map(item=>`<li>${item}</li>`).join('')}</ul></div><div class="meal-card"><div class="meal-header"><span class="meal-icon">&#x1F319;</span><span class="meal-name">晚餐</span><span class="meal-cal">${plan.meals.dinner.calories} 大卡</span></div><ul class="meal-items">${plan.meals.dinner.items.map(item=>`<li>${item}</li>`).join('')}</ul></div><div class="meal-card"><div class="meal-header"><span class="meal-icon">&#x1F34E;</span><span class="meal-name">加餐</span><span class="meal-cal">${plan.meals.snack.calories} 大卡</span></div><ul class="meal-items">${plan.meals.snack.items.map(item=>`<li>${item}</li>`).join('')}</ul></div></div><div class="section-card"><div class="section-title">热量分布</div><canvas id="diet-calorie-chart" style="width:100%;height:120px;"></canvas></div></div>`;document.getElementById('diet-checkin-btn').addEventListener('click',()=>{setCheckin(user.id,'diet',getTodayStr(),true);showToast('饮食打卡成功！');setTimeout(()=>Router.navigate('diet'),500)});setTimeout(()=>{Chart.drawMiniBar('diet-calorie-chart',[plan.meals.breakfast.calories,plan.meals.lunch.calories,plan.meals.dinner.calories,plan.meals.snack.calories],['早餐','午餐','晚餐','加餐'])},100)}

function renderExercisePage(container){const user=getCurrentUser();if(!user){Router.navigate('login');return}const exerciseChecked=isTodayChecked(user.id,'exercise');const todayPlan=user.exercisePlan.weekly.find(d=>d.day===getDayOfWeek())||{type:'休息',items:['今天休息'],duration:0,calories:0};container.innerHTML=`<div class="page exercise-page"><div class="page-header"><h2>运动计划</h2><div class="today-tag">${getDayOfWeek()}</div></div><div class="exercise-checkin ${exerciseChecked?'checked':''}"><div class="checkin-icon">${exerciseChecked?'✅':'⬜'}</div><div class="checkin-text">${exerciseChecked?'今日已打卡':'今日未打卡'}</div><button class="btn-checkin" ${exerciseChecked?'disabled':''} id="exercise-checkin-btn">${exerciseChecked?'已完成':'打卡'}</button></div><div class="today-exercise"><div class="today-label">今日运动</div><div class="today-type-badge ${todayPlan.type}">${todayPlan.type}</div><div class="today-items">${todayPlan.items.map(item=>`<div class="exercise-item">${item}</div>`).join('')}</div><div class="today-meta"><span>⏱ ${todayPlan.duration}分钟</span><span>�� ${todayPlan.calories}大卡</span></div></div><div class="section-card"><div class="section-title">本周计划</div><div class="weekly-plan">${user.exercisePlan.weekly.map(d=>`<div class="day-card ${d.day===getDayOfWeek()?'today':''}"><div class="day-name">${d.day}</div><div class="day-type ${d.type}">${d.type}</div><div class="day-duration">${d.duration}min</div></div>`).join('')}</div></div></div>`;document.getElementById('exercise-checkin-btn').addEventListener('click',()=>{setCheckin(user.id,'exercise',getTodayStr(),true);showToast('运动打卡成功！');setTimeout(()=>Router.navigate('exercise'),500)})}

function renderStylePage(container){const user=getCurrentUser();if(!user){Router.navigate('login');return}const style=user.styleAdvice;container.innerHTML=`<div class="page style-page"><div class="page-header"><h2>形象改造</h2></div><div class="section-card"><div class="section-title">体型分析</div><div class="body-analysis"><div class="analysis-tags"><span class="tag">${user.bodyType}</span><span class="tag">${user.faceShape}</span><span class="tag">${user.skinTone}</span></div><p class="analysis-text">${style.bodyAnalysis}</p></div></div><div class="section-card"><div class="section-title">服装搭配</div><div class="compare-section"><div class="compare-card before"><div class="compare-label">改造前</div><div class="compare-content">${style.clothing.before}</div></div><div class="compare-arrow">→</div><div class="compare-card after"><div class="compare-label">改造后</div><div class="compare-content">${style.clothing.after}</div></div></div><div class="tips-list"><div class="tips-title">搭配建议</div>${style.clothing.tips.map(tip=>`<div class="tip-item">${tip}</div>`).join('')}</div></div><div class="section-card"><div class="section-title">发型设计</div><div class="compare-section"><div class="compare-card before"><div class="compare-label">改造前</div><div class="compare-content">${style.hairstyle.before}</div></div><div class="compare-arrow">→</div><div class="compare-card after"><div class="compare-label">改造后</div><div class="compare-content">${style.hairstyle.after}</div></div></div><div class="tips-list"><div class="tips-title">发型建议</div>${style.hairstyle.tips.map(tip=>`<div class="tip-item">${tip}</div>`).join('')}</div></div></div>`}

function renderReportPage(container){const user=getCurrentUser();if(!user){Router.navigate('login');return}const activeStage=user.stages.find(s=>s.status==='active');const dietRate=activeStage?calcCheckinRate(user.id,'diet',activeStage.startDate,activeStage.endDate):'0.0';const exerciseRate=activeStage?calcCheckinRate(user.id,'exercise',activeStage.startDate,activeStage.endDate):'0.0';const suggestions=generateAdjustment(user.id);container.innerHTML=`<div class="page report-page"><div class="page-header"><h2>分析报告</h2></div><div class="report-summary"><div class="summary-card"><div class="summary-label">当前体重</div><div class="summary-value">${user.currentWeight}kg</div></div><div class="summary-card"><div class="summary-label">累计减重</div><div class="summary-value">${(user.stages[0].startWeight-user.currentWeight).toFixed(1)}kg</div></div><div class="summary-card"><div class="summary-label">剩余目标</div><div class="summary-value">${(user.currentWeight-user.targetWeight).toFixed(1)}kg</div></div></div><div class="section-card"><div class="section-title">体重变化曲线</div><canvas id="report-trend" style="width:100%;height:200px;"></canvas></div>${activeStage?`<div class="section-card"><div class="section-title">阶段执行分析</div><div class="execution-stats"><div class="exec-item"><div class="exec-label">饮食打卡完成率</div><div class="exec-bar"><div class="exec-fill diet" style="width: ${dietRate}%"></div></div><div class="exec-value">${dietRate}%</div></div><div class="exec-item"><div class="exec-label">运动打卡完成率</div><div class="exec-bar"><div class="exec-fill exercise" style="width: ${exerciseRate}%"></div></div><div class="exec-value">${exerciseRate}%</div></div></div></div><div class="section-card"><div class="section-title">调整建议</div><div id="report-adjustments">${suggestions&&suggestions.length>0?suggestions.map(s=>`<div class="adjustment-card"><div class="adjustment-header"><span class="adjustment-icon">${s.icon}</span><span class="adjustment-title">${s.title}</span></div><div class="adjustment-reason">${s.reason}</div><ul class="adjustment-actions">${s.actions.map(a=>`<li>${a}</li>`).join('')}</ul></div>`).join(''):'<p class="empty-text">执行良好，继续保持！</p>'}</div></div>`:''}</div>`;setTimeout(()=>{Chart.drawWeightTrend('report-trend',generateWeightTrend(user),user.targetWeight)},100)}

function showToast(message){const toast=document.createElement('div');toast.className='toast';toast.textContent=message;document.body.appendChild(toast);setTimeout(()=>toast.classList.add('show'),10);setTimeout(()=>{toast.classList.remove('show');setTimeout(()=>toast.remove(),300)},2000)}
</script>
</body>
</
